name: EAS Android Production Build & Submit

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Google Play track'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - beta
          - alpha
          - internal

jobs:
  build-and-submit:
    name: Build & Submit Android to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build & Submit Android App
        working-directory: artifacts/ridhi
        env:
          EAS_NO_VCS: 1
        run: |
          npx eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --auto-submit \
            --submit-profile production

      - name: Build completed
        if: always()
        run: echo "Build & submit finished with status ${{ job.status }}"
