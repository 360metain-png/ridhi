name: EAS iOS Build & Submit

on:
  push:
    branches: [main, master]
    paths:
      - 'artifacts/ridhi/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      auto_submit:
        description: 'Auto-submit to App Store after build'
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build iOS App & Submit to App Store
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/ridhi

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: artifacts/ridhi/package-lock.json

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Check ASC API Key env vars
        run: |
          echo "EXPO_ASC_KEY_ID is set: ${{ secrets.EXPO_ASC_KEY_ID != '' }}"
          echo "EXPO_ASC_ISSUER_ID is set: ${{ secrets.EXPO_ASC_ISSUER_ID != '' }}"
          echo "EXPO_ASC_KEY_P8 is set: ${{ secrets.EXPO_ASC_KEY_P8 != '' }}"

      - name: Decode ASC API Key to file
        run: |
          mkdir -p ~/asc
          echo "${{ secrets.EXPO_ASC_KEY_P8 }}" | base64 -d > ~/asc/asc_api_key.p8
          echo "EXPO_ASC_API_KEY_PATH=$HOME/asc/asc_api_key.p8" >> $GITHUB_ENV
          echo "EXPO_ASC_KEY_ID=${{ secrets.EXPO_ASC_KEY_ID }}" >> $GITHUB_ENV
          echo "EXPO_ASC_ISSUER_ID=${{ secrets.EXPO_ASC_ISSUER_ID }}" >> $GITHUB_ENV

      - name: Build iOS & Submit to App Store
        env:
          EXPO_ASC_API_KEY_PATH: ${{ env.EXPO_ASC_API_KEY_PATH }}
          EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_APPLE_TEAM_TYPE: COMPANY_OR_ORGANIZATION
          EAS_NO_VCS: 1
        run: |
          npx eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.auto_submit == 'true') || github.event_name == 'push' && '--auto-submit' || '' }}

      - name: Build completed
        if: always()
        run: echo "Build step finished with status ${{ job.status }}"
