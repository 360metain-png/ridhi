name: EAS Android Build & Submit

on:
  push:
    branches: [main, master]
    paths:
      - 'artifacts/ridhi/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:
    inputs:
      auto_submit:
        description: 'Auto-submit to Google Play after build'
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build Android App & Submit to Google Play
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/ridhi

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: artifacts/ridhi/package-lock.json

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Decode Google Service Account Key
        run: |
          mkdir -p ~/gplay
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_BASE64 }}" | base64 -d > ~/gplay/google-service-account.json
          echo "GOOGLE_SERVICE_ACCOUNT_KEY_PATH=$HOME/gplay/google-service-account.json" >> $GITHUB_ENV

      - name: Build Android & Submit to Google Play
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_PATH: ${{ env.GOOGLE_SERVICE_ACCOUNT_KEY_PATH }}
          EAS_NO_VCS: 1
        run: |
          npx eas build \
            --platform android \
            --profile production \
            --non-interactive \
            ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.auto_submit == 'true') || github.event_name == 'push' && '--auto-submit' || '' }}

      - name: Build completed
        if: always()
        run: echo "Build step finished with status ${{ job.status }}"
