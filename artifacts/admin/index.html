<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Ridhi Admin Dashboard</title>

    <!-- SEO -->
    <meta name="description" content="Ridhi control panel — manage users, content moderation, host & agent access, coin economy, live streams, KYC verification, and platform-wide feature flags for the Ridhi social app." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#7B2FBE" />

    <!-- Open Graph -->
    <meta property="og:title" content="Ridhi Admin Dashboard" />
    <meta property="og:description" content="Ridhi control panel — manage users, content moderation, host & agent access, coin economy, live streams, KYC verification, and platform-wide feature flags." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ridhi Admin Dashboard" />
    <meta name="twitter:description" content="Ridhi control panel — manage users, content moderation, host & agent access, coin economy, live streams, KYC verification, and platform-wide feature flags." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts — non-render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
