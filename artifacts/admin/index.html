<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Ridhi Admin Dashboard – Control Panel</title>

    <!-- SEO — per-route control via react-helmet-async; default noindex set in App.tsx -->
    <meta name="description" content="Ridhi — India's social networking and dating app. Connect, stream, date, and earn on India's #1 social universe." />
    <meta name="robots" content="index, follow" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    <meta name="theme-color" content="#7B2FBE" />
    <meta name="application-name" content="Ridhi Admin" />

    <!-- Open Graph -->
    <meta property="og:title"       content="Ridhi Admin Dashboard" />
    <meta property="og:description" content="Ridhi Admin Dashboard — manage users, hosts, agents, content, coins, payouts, and platform settings." />
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Ridhi Admin Dashboard" />
    <meta name="twitter:description" content="Ridhi Admin Dashboard — manage users, hosts, agents, content, coins, payouts, and platform settings." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Performance: DNS prefetch -->
    <link rel="dns-prefetch"  href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch"  href="https://fonts.gstatic.com" />

    <!-- Performance: Preconnect to font origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Performance: Preload Inter font stylesheet (non-render-blocking) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Critical CSS — prevents flash of unstyled content -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%;width:100%}
      body{background:#f8f9fa;font-family:Inter,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
      #root{height:100%;display:flex;flex-direction:column}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
